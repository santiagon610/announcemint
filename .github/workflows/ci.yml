# Continuous Integration: lint, test, and optional installer builds.
# Installer builds require native runners: Windows (MSI/WiX), macOS (.app), Linux (AppImage).
# They cannot all run on Linux; see .github/workflows/build-installers.yml.
name: Continuous Integration

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_installers:
        description: "Build installers and upload as artifacts"
        required: true
        default: true
        type: boolean

jobs:
  lint-and-test:
    name: Lint and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri"

      - name: Install Linux system dependencies
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend deps
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Rust format check
        run: cargo fmt --all -- --check
        working-directory: src-tauri

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: src-tauri

      - name: Cargo test
        run: cargo test
        working-directory: src-tauri

      - name: Frontend format check
        run: npm run format:check
        continue-on-error: true

  semantic-pr:
    name: Semantic pull request verification
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore

  build-installers:
    name: Build installers (Windows MSI, macOS app, Linux AppImage)
    uses: ./.github/workflows/build-installers.yml
    with:
      ref: ${{ github.sha }}
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.build_installers == 'true')
    needs: lint-and-test
    secrets: inherit
