name: Continuous Integration

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_installers:
        description: "Build installers and upload as artifacts"
        required: true
        default: true
        type: boolean

jobs:
  lint-and-test:
    name: Lint and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend deps
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Rust format check
        run: cargo fmt --all -- --check
        working-directory: src-tauri

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: src-tauri

      - name: Cargo test
        run: cargo test
        working-directory: src-tauri

      - name: Frontend format check
        run: npm run format:check
        continue-on-error: true

  semantic-pr:
    name: Semantic pull request verification
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore

  build-windows:
    name: Build app for Windows
    runs-on: windows-latest
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.build_installers == 'true')
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: npm run tauri build -- --bundles msi --ci --no-sign
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
      - uses: actions/upload-artifact@v4
        with:
          name: windows-msi-installer
          path: src-tauri/target/release/bundle/msi/*.msi

  build-macos:
    name: Build app for macOS
    runs-on: macos-latest
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.build_installers == 'true')
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: npm run tauri build -- --bundles app --ci --no-sign
      - uses: actions/upload-artifact@v4
        with:
          name: macos-app-bundle
          path: src-tauri/target/release/bundle/macos/*.app

  build-linux:
    name: Build app for Linux
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.build_installers == 'true')
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf squashfs-tools
      - run: npm ci
      # CI has no FUSE; linuxdeploy is an AppImage and needs extract-and-run.
      - run: npm run tauri build -- --bundles appimage --ci
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
      - name: Repack AppImage with gzip for AppImageLauncher
        run: |
          for f in src-tauri/target/release/bundle/appimage/*.AppImage; do
            chmod +x scripts/repack-appimage-gzip.sh
            ./scripts/repack-appimage-gzip.sh "$f"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage-installer
          path: src-tauri/target/release/bundle/appimage/*.AppImage
