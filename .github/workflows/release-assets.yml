# Build installers and attach them to the GitHub Release.
# Triggers on release:published only (Release Please or UI). Using both
# release:published and push tags would run twice when Release Please publishes.
# Each platform is built on its native runner; see build-installers.yml.
name: Release Assets

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-installers:
    name: Build installers
    uses: ./.github/workflows/build-installers.yml
    with:
      ref: refs/tags/${{ github.event.release.tag_name }}
    secrets: inherit

  upload-release-assets:
    name: Upload assets to release
    runs-on: ubuntu-latest
    needs: build-installers
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ github.event.release.tag_name }}
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            artifacts/windows-msi/*.msi \
            artifacts/macos-app/*.zip \
            artifacts/linux-appimage/*.AppImage \
            --clobber
