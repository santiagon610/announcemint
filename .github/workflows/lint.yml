---
name: Lint and Test

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master

jobs:
  lint-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/requirements.txt', '**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run black (code formatting)
        id: black
        run: |
          black --check --diff . 2>&1 | tee black_output.txt || true
        continue-on-error: true

      - name: Run isort (import sorting)
        id: isort
        run: |
          isort --check-only --diff . 2>&1 | tee isort_output.txt || true
        continue-on-error: true

      - name: Run flake8 (linting)
        id: flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics 2>&1 | tee flake8_critical.txt || true
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=88 --statistics 2>&1 | tee flake8_style.txt || true
        continue-on-error: true

      - name: Run mypy (type checking)
        id: mypy
        run: |
          mypy . 2>&1 | tee mypy_output.txt || true
        continue-on-error: true

      - name: Run tests
        run: |
          pytest --cov=announcemint --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
          
      - name: Upload Linter Outputs as Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linter-outputs-${{ matrix.os }}-${{ matrix.python-version }}
          path: |
            black_output.txt
            isort_output.txt
            flake8_critical.txt
            flake8_style.txt
            mypy_output.txt
          retention-days: 7

      - name: Create Linter Report Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            // Read linter outputs
            const blackOutput = fs.existsSync('black_output.txt') ? fs.readFileSync('black_output.txt', 'utf8') : '';
            const isortOutput = fs.existsSync('isort_output.txt') ? fs.readFileSync('isort_output.txt', 'utf8');
            const flake8CriticalOutput = fs.existsSync('flake8_critical.txt') ? fs.readFileSync('flake8_critical.txt', 'utf8');
            const flake8StyleOutput = fs.existsSync('flake8_style.txt') ? fs.readFileSync('flake8_style.txt', 'utf8');
            const mypyOutput = fs.existsSync('mypy_output.txt') ? fs.readFileSync('mypy_output.txt', 'utf8');
            
            // Check if there are any issues
            const hasIssues = blackOutput.includes('would reformat') || 
                             isortOutput.includes('Imports are incorrectly sorted') ||
                             flake8CriticalOutput.includes('error:') ||
                             flake8StyleOutput.includes('error:') ||
                             mypyOutput.includes('error:');
            
            // Create comment content
            let commentBody = '## 🔍 Linter Report for ' + context.job + ' (' + context.runner.os + ' - Python ' + context.runner.pythonVersion + ')\n\n';
            
            if (!hasIssues) {
              commentBody += '✅ **All linters passed successfully!**\n\n';
            } else {
              commentBody += '⚠️ **Some linter issues were found:**\n\n';
              
              if (blackOutput.includes('would reformat')) {
                commentBody += '### 🎨 Black (Code Formatting)\n';
                commentBody += '```diff\n' + blackOutput + '\n```\n\n';
              }
              
              if (isortOutput.includes('Imports are incorrectly sorted')) {
                commentBody += '### 📦 isort (Import Sorting)\n';
                commentBody += '```\n' + isortOutput + '\n```\n\n';
              }
              
              if (flake8CriticalOutput.includes('error:')) {
                commentBody += '### 🚨 Flake8 (Critical Issues)\n';
                commentBody += '```\n' + flake8CriticalOutput + '\n```\n\n';
              }
              
              if (flake8StyleOutput.includes('error:')) {
                commentBody += '### 🔧 Flake8 (Style Issues)\n';
                commentBody += '```\n' + flake8StyleOutput + '\n```\n\n';
              }
              
              if (mypyOutput.includes('error:')) {
                commentBody += '### 🔍 MyPy (Type Checking)\n';
                commentBody += '```\n' + mypyOutput + '\n```\n\n';
              }
            }
            
            commentBody += '---\n*Report generated by GitHub Actions on ' + new Date().toISOString() + '*';
            
            // Find existing comment to update
            const existingComments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            
            const existingComment = existingComments.data.find(function(comment) {
              return comment.user.type === 'Bot' && 
                     comment.body.includes('## 🔍 Linter Report for ' + context.job);
            });
            
            if (existingComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: commentBody
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });
            }

  # Summary job that runs after all matrix jobs complete
  summary:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Create Summary Comment
        uses: actions/github-script@v7
        with:
          script: |
            // Create a summary comment that shows overall status
            const summaryBody = '## 📊 Linter Summary\n\n' +
                              'All linter jobs have completed. Check individual job comments for detailed reports.\n\n' +
                              '**Matrix Coverage:**\n' +
                              '- ✅ Ubuntu (Python 3.10, 3.11, 3.12)\n' +
                              '- ✅ Windows (Python 3.10, 3.11, 3.12)\n' +
                              '- ✅ macOS (Python 3.10, 3.11, 3.12)\n\n' +
                              '---\n' +
                              '*Summary generated by GitHub Actions on ' + new Date().toISOString() + '*';
            
            // Find existing summary comment to update
            const existingComments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            
            const existingSummary = existingComments.data.find(function(comment) {
              return comment.user.type === 'Bot' && 
                     comment.body.includes('## 📊 Linter Summary');
            });
            
            if (existingSummary) {
              // Update existing summary comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingSummary.id,
                body: summaryBody
              });
            } else {
              // Create new summary comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: summaryBody
              });
            }
